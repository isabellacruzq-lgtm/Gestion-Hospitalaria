<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Toast</title>

    <link rel="stylesheet" href="critical-toast.component.css">
</head>
<body>

<div class="toast-container" id="toast">

    <!-- Card -->
    <div class="toast-card">

        <!-- Contenido -->
        <div class="toast-content">

            <!-- Header -->
            <div class="toast-header">

                <!-- Icono -->
                <div class="toast-icon">

                    <!-- ALERT ICON -->
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
                        <path d="M12 9V13" stroke="#7e22ce" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="12" cy="17" r="1" fill="#7e22ce"/>
                        <path d="M10.29 3.86L1.82 18A2 2 0 0 0 3.53 21H20.47A2 2 0 0 0 22.18 18L13.71 3.86A2 2 0 0 0 10.29 3.86Z"
                              stroke="#7e22ce"
                              stroke-width="2"
                              stroke-linejoin="round"/>
                    </svg>

                </div>

                <!-- Textos -->
                <div class="toast-texts">
                    <h1>CONFIRMAR ELIMINACIÓN</h1>

                    <p>
                        ¿Desea eliminar este registro de la base de datos?
                    </p>
                </div>

                <!-- Close -->
                <button class="close-button">
                    ✕
                </button>

            </div>

            <!-- Warning -->
            <div class="warning-box">
          <span>
            ACCIÓN IRREVERSIBLE • REGISTRO PERMANENTE
          </span>
            </div>

            <!-- Buttons -->
            <div class="toast-actions">

                <button class="confirm-button">
                    SÍ, ELIMINAR
                </button>

                <button class="cancel-button">
                    CANCELAR
                </button>

            </div>

        </div>

        <!-- Progress -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

    </div>

</div>

</body>
</html>
